image: python:3.12-slim

stages:
  - test
  - build
  - deploy

cache:
  paths:
    - .cache/pip
    - venv/

before_script:
  - python -V
  - pip install --upgrade pip

test:
  stage: test
  script:
    - pip install -r requirements.txt
    - python -m unittest discover -s tests -p "test_*.py" || echo "No tests found"

build:
  stage: build
  script:
    - pip install -r requirements.txt
    - python setup.py build
  artifacts:
    paths:
      - dist/*

deploy:
  stage: deploy
  script:
    - python setup.py install
    - pip install -r requirements.txt
  environment:
    name: production
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
