services:
  axiom-app-1:
    image: axiom-dataops:latest
    container_name: axiom-app-1
    ports:
      - "8081:8080"
    environment:
      - DATABASE_SERVER=host.docker.internal\SQLEXPRESS
    restart: unless-stopped
    networks:
      - axiom-network

  axiom-app-2:
    image: axiom-dataops:latest
    container_name: axiom-app-2
    ports:
      - "8082:8080"
    environment:
      - DATABASE_SERVER=host.docker.internal\SQLEXPRESS
    restart: unless-stopped
    networks:
      - axiom-network

  axiom-app-3:
    image: axiom-dataops:latest
    container_name: axiom-app-3
    ports:
      - "8083:8080"
    environment:
      - DATABASE_SERVER=host.docker.internal\SQLEXPRESS
    restart: unless-stopped
    networks:
      - axiom-network

  load-balancer:
    image: nginx:latest
    container_name: axiom-loadbalancer
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - axiom-app-1
      - axiom-app-2
      - axiom-app-3
    restart: unless-stopped
    networks:
      - axiom-network

  prometheus:
    image: prom/prometheus:latest
    container_name: axiom-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    depends_on:
      - axiom-app-1
      - axiom-app-2
      - axiom-app-3
    restart: unless-stopped
    networks:
      - axiom-network

  grafana:
    image: grafana/grafana:latest
    container_name: axiom-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SECURITY_ADMIN_USER=admin
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - axiom-network

networks:
  axiom-network:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data:
